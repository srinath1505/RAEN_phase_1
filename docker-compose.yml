# Local testing only — Railway uses the Dockerfile directly, not this file.
# Usage:
#   docker compose up --build          → build + start
#   docker compose up --build -d       → detached
#   docker compose down                → stop + remove container
#   docker compose logs -f             → tail logs

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    # Loads your real backend/.env so the container hits the real Neon DB + services
    env_file:
      - backend/.env
    environment:
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bare Obsession — RAEN</title>
  <meta name="description" content="Bare Obsession by RAEN. Redirecting to product page."/>
  <meta http-equiv="refresh" content="0;url=product-detail.html?slug=bare-obsession"/>
  <link rel="canonical" href="https://raen.design/product-detail.html?slug=bare-obsession"/>
  <!-- RAEN Analytics — session tracking -->
<script>
(function () {
  var sid = localStorage.getItem('raen_session');
  if (!sid) {
    sid = 'sess_' + Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2);
    localStorage.setItem('raen_session', sid);
  }
  var base = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
    ? 'http://localhost:5000' : '';
  var p = window.location.pathname + window.location.search;
  fetch(base + '/api/analytics/pageview', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path: p, sessionId: sid, productId: 'bare-obsession' }),
    keepalive: true
  }).catch(function () {});
  window.__raenSession = sid;
  window.__trackCart = function (event, productId, orderId) {
    fetch(base + '/api/analytics/cart-event', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ event: event, sessionId: sid, productId: productId || null, orderId: orderId || null }),
      keepalive: true
    }).catch(function () {});
  };
  // Redirect immediately — meta refresh is fallback for no-JS
  window.location.replace('product-detail.html?slug=bare-obsession');
})();
</script>
</head>
<body style="margin:0;background:#0a0a0a;display:flex;align-items:center;justify-content:center;min-height:100vh;">
  <p style="font-family:Helvetica,Arial,sans-serif;font-size:11px;letter-spacing:0.2em;color:#888;text-transform:uppercase;">
    Redirecting to Bare Obsession&hellip;
  </p>
  <noscript>
    <p style="font-family:Helvetica,Arial,sans-serif;font-size:13px;color:#ccc;">
      Click <a href="product-detail.html?slug=bare-obsession" style="color:#b8960c;">Bare Obsession</a> if not redirected.
    </p>
  </noscript>
</body>
</html>

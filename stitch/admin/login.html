<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>RAEN Admin — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Helvetica, Arial, sans-serif;
      background: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      width: 100%;
      max-width: 380px;
      padding: 52px 48px 48px;
      margin: 20px;
    }
    .logo {
      font-size: 11px;
      letter-spacing: 0.35em;
      color: #b8960c;
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: #999;
      text-align: center;
      text-transform: uppercase;
      margin-bottom: 40px;
    }
    label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.15em;
      color: #555;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .input-wrap {
      position: relative;
    }
    input {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid #ddd;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
      background: #fff;
    }
    input:focus { border-color: #1a1a1a; }
    .toggle-pw {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 11px;
      color: #999;
      padding: 0 4px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .toggle-pw:hover { color: #555; }
    .field { margin-bottom: 20px; }
    .btn {
      width: 100%;
      padding: 13px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-top: 8px;
      transition: background 0.15s;
    }
    .btn:hover:not(:disabled) { background: #333; }
    .btn:disabled { background: #999; cursor: not-allowed; }
    .msg {
      font-size: 12px;
      margin-top: 16px;
      padding: 13px 16px;
      display: none;
      line-height: 1.5;
      border-radius: 2px;
    }
    .msg.error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    .msg.info  { background: #fef9c3; color: #92400e; border: 1px solid #fcd34d; }
    .divider { height: 1px; background: #f0f0f0; margin: 32px 0 28px; }
    .hint {
      font-size: 10px;
      letter-spacing: 0.1em;
      color: #bbb;
      text-align: center;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">RAEN</div>
    <div class="subtitle">Admin Portal</div>

    <div class="field">
      <label>Email Address</label>
      <input type="email" id="email" autocomplete="email" placeholder="admin@raen.design">
    </div>
    <div class="field">
      <label>Password</label>
      <div class="input-wrap">
        <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" style="padding-right:46px;">
        <button type="button" class="toggle-pw" id="toggle-pw" onclick="togglePassword()">Show</button>
      </div>
    </div>

    <button class="btn" id="btn" onclick="doLogin()">Sign In</button>
    <div class="msg" id="msg"></div>

    <div class="divider"></div>
    <div class="hint">Restricted access &mdash; authorised personnel only</div>
  </div>

  <script>
    var API = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
      ? 'http://localhost:5000'
      : '';

    // If already have an admin token, go straight to the dashboard.
    var _tok = localStorage.getItem('raen_auth_token');
    if (_tok) {
      window.location.replace('index.html');
    } else {
      // Only set up the page when we're NOT redirecting
      init();
    }

    function init() {
      // Show session-expired notice if bounced back from dashboard
      if (document.referrer && document.referrer.indexOf('index.html') !== -1) {
        showMsg('Your session has expired. Please sign in again.', 'info');
      }

      document.getElementById('email').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); document.getElementById('password').focus(); }
      });
      document.getElementById('password').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); doLogin(); }
      });
    }

    function togglePassword() {
      var pw = document.getElementById('password');
      var btn = document.getElementById('toggle-pw');
      if (pw.type === 'password') {
        pw.type = 'text';
        btn.textContent = 'Hide';
      } else {
        pw.type = 'password';
        btn.textContent = 'Show';
      }
    }

    function showMsg(text, type) {
      var el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg ' + type;
      el.style.display = 'block';
    }

    function hideMsg() {
      document.getElementById('msg').style.display = 'none';
    }

    async function doLogin() {
      var btn = document.getElementById('btn');
      if (btn.disabled) return; // prevent double-submit

      var email    = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;

      hideMsg();

      if (!email || !password) {
        showMsg('Please enter your email and password.', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing In...';

      try {
        var r = await fetch(API + '/api/admin/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, password: password })
        });

        var data;
        try {
          data = await r.json();
        } catch(_) {
          throw new Error('Server returned an unexpected response.');
        }

        if (!r.ok || !data.success || !data.data || !data.data.token) {
          throw new Error(data.message || 'Invalid email or password.');
        }

        localStorage.setItem('raen_auth_token', data.data.token);
        window.location.replace('index.html');

      } catch (e) {
        showMsg(e.message || 'Sign in failed. Please check your credentials and try again.', 'error');
        btn.disabled = false;
        btn.textContent = 'Sign In';
        document.getElementById('password').focus();
      }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>RAEN Admin — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Helvetica, Arial, sans-serif;
      background: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      width: 100%;
      max-width: 380px;
      padding: 52px 48px 48px;
      margin: 20px;
    }
    .logo {
      font-size: 11px;
      letter-spacing: 0.35em;
      color: #b8960c;
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: #999;
      text-align: center;
      text-transform: uppercase;
      margin-bottom: 40px;
    }
    label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.15em;
      color: #555;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid #ddd;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
      background: #fff;
    }
    input:focus { border-color: #1a1a1a; }
    .field { margin-bottom: 20px; }
    .btn {
      width: 100%;
      padding: 13px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-top: 8px;
      transition: background 0.15s;
    }
    .btn:hover { background: #333; }
    .btn:disabled { background: #999; cursor: not-allowed; }
    .err {
      color: #dc2626;
      font-size: 12px;
      margin-top: 14px;
      text-align: center;
      display: none;
      letter-spacing: 0.03em;
    }
    .divider {
      height: 1px;
      background: #f0f0f0;
      margin: 32px 0 28px;
    }
    .hint {
      font-size: 10px;
      letter-spacing: 0.1em;
      color: #bbb;
      text-align: center;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">RAEN</div>
    <div class="subtitle">Admin Portal</div>

    <div class="field">
      <label>Email Address</label>
      <input type="email" id="email" autocomplete="email" placeholder="admin@raen.design">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" autocomplete="current-password" placeholder="••••••••">
    </div>

    <button class="btn" id="btn" onclick="doLogin()">Sign In</button>
    <p class="err" id="err">Invalid email or password. Please try again.</p>

    <div class="divider"></div>
    <div class="hint">Restricted access &mdash; authorised personnel only</div>
  </div>

  <script>
    const API = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
      ? 'http://localhost:5000'
      : '';

    if (localStorage.getItem('raen_auth_token')) {
      window.location.href = 'index.html';
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('btn');
      const err = document.getElementById('err');

      if (!email || !password) {
        err.textContent = 'Please enter your email and password.';
        err.style.display = 'block';
        return;
      }

      err.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const r = await fetch(API + '/api/admin/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await r.json();
        if (!data.success || !data.data?.token) {
          throw new Error(data.message || 'Invalid credentials');
        }
        localStorage.setItem('raen_auth_token', data.data.token);
        window.location.href = 'index.html';
      } catch (e) {
        err.textContent = 'Invalid email or password. Please try again.';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }
  </script>
</body>
</html>

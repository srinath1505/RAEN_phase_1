<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>RAEN Admin — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Helvetica, Arial, sans-serif;
      background: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      width: 100%;
      max-width: 380px;
      padding: 52px 48px 48px;
      margin: 20px;
    }
    .logo {
      font-size: 11px;
      letter-spacing: 0.35em;
      color: #b8960c;
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: #999;
      text-align: center;
      text-transform: uppercase;
      margin-bottom: 40px;
    }
    label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.15em;
      color: #555;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid #ddd;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
      background: #fff;
    }
    input:focus { border-color: #1a1a1a; }
    .field { margin-bottom: 20px; }
    .btn {
      width: 100%;
      padding: 13px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-top: 8px;
      transition: background 0.15s;
    }
    .btn:hover:not(:disabled) { background: #333; }
    .btn:disabled { background: #999; cursor: not-allowed; }
    .err {
      font-size: 12px;
      margin-top: 14px;
      padding: 12px 14px;
      text-align: center;
      display: none;
      letter-spacing: 0.03em;
      border-radius: 2px;
    }
    .err.error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    .err.info  { background: #fef9c3; color: #92400e; border: 1px solid #fcd34d; }
    .divider {
      height: 1px;
      background: #f0f0f0;
      margin: 32px 0 28px;
    }
    .hint {
      font-size: 10px;
      letter-spacing: 0.1em;
      color: #bbb;
      text-align: center;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">RAEN</div>
    <div class="subtitle">Admin Portal</div>

    <div class="field">
      <label>Email Address</label>
      <input type="email" id="email" autocomplete="email" placeholder="admin@raen.design">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" autocomplete="current-password" placeholder="••••••••">
    </div>

    <button class="btn" id="btn" onclick="doLogin()">Sign In</button>
    <p class="err" id="err"></p>

    <div class="divider"></div>
    <div class="hint">Restricted access &mdash; authorised personnel only</div>
  </div>

  <script>
    const API = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
      ? 'http://localhost:5000'
      : '';

    // If a valid admin token is already stored, go straight to the dashboard.
    // Old tokens (without adminLogin:true) will be rejected by the dashboard,
    // which clears the token and redirects back here — so we do NOT loop.
    const _existingToken = localStorage.getItem('raen_auth_token');
    if (_existingToken) {
      window.location.replace('index.html');
      // Stop executing — the page is navigating away.
      // Using a throw to prevent the rest of the script from running during
      // the navigation delay (avoids confusing console noise).
      throw new Error('Redirecting to dashboard');
    }

    // Show a session-expired notice if we were bounced back here by a failed
    // admin API call (index.html removes the token before redirecting here).
    if (document.referrer && document.referrer.includes('index.html')) {
      const errEl = document.getElementById('err');
      errEl.textContent = 'Your session expired. Please sign in again.';
      errEl.className = 'err info';
      errEl.style.display = 'block';
    }

    document.getElementById('password').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doLogin();
    });
    document.getElementById('email').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
      const emailEl = document.getElementById('email');
      const passwordEl = document.getElementById('password');
      const btn = document.getElementById('btn');
      const errEl = document.getElementById('err');

      const email = emailEl.value.trim();
      const password = passwordEl.value;

      errEl.style.display = 'none';

      if (!email || !password) {
        errEl.textContent = 'Please enter your email and password.';
        errEl.className = 'err error';
        errEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing In...';

      try {
        const r = await fetch(API + '/api/admin/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        let data;
        try {
          data = await r.json();
        } catch {
          throw new Error('Server returned an unexpected response. Please try again.');
        }

        if (!r.ok || !data.success || !data.data?.token) {
          throw new Error(data.message || 'Invalid email or password.');
        }

        localStorage.setItem('raen_auth_token', data.data.token);
        window.location.replace('index.html');

      } catch (e) {
        errEl.textContent = e.message || 'Sign in failed. Please try again.';
        errEl.className = 'err error';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
        emailEl.focus();
      }
    }
  </script>
</body>
</html>
